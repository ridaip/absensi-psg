<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Guru - Absensi PSG</title>
    
    <meta name="theme-color" content="#1E3A8A">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#1E3A8A' },
                    animation: {
                        'slideUp': 'slideUp 0.3s ease-out forwards',
                        'fadeIn': 'fadeIn 0.2s ease-out forwards'
                    },
                    keyframes: {
                        slideUp: {
                            'from': { opacity: '0', transform: 'translateY(15px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        },
                        fadeIn: {
                            'from': { opacity: '0' },
                            'to': { opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F1F5F9; }
        #toast { transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        #toast.show { bottom: 20px; }
        .spinner { border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { display: none; }
        
        .tab-btn.active { color: #1E3A8A; border-bottom: 2px solid #1E3A8A; font-weight: 600; }
        .tab-btn { color: #64748B; border-bottom: 2px solid transparent; font-weight: 500; }

        /* Print/PDF Export Styles */
        @media print {
            body { background: white !important; }
            body * { visibility: hidden; }
            #mainApp, #mainApp * { visibility: visible; color: black !important; }
            #mainApp { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none !important; border: none !important; margin: 0; padding: 0; }
            header, nav, #btnExportPdf, .no-print, input, select { display: none !important; }
            .overflow-x-auto { overflow: visible !important; }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center relative overflow-hidden antialiased">

    <div id="mainContainer" class="w-full max-w-[500px] h-[100dvh] md:h-[90vh] md:rounded-[1.5rem] flex flex-col relative z-10 overflow-hidden bg-slate-50 md:shadow-xl md:border md:border-slate-200">
        
        <!-- HEADER -->
        <header class="bg-white px-5 py-4 flex justify-between items-center shadow-sm z-20 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                    <i class="ph-fill ph-chalkboard-teacher text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-800 leading-tight tracking-tight">Portal Guru</h1>
                    <p id="headerDate" class="text-xs font-medium text-slate-500"></p>
                </div>
            </div>
            
            <div id="userProfile" class="hidden relative items-center gap-2">
                <button id="btnProfileMenu" class="bg-slate-50 p-2 rounded-full text-slate-600 border border-slate-200 hover:bg-slate-100 transition-all focus:outline-none">
                    <i class="ph ph-user text-lg"></i>
                </button>
                <div id="dropdownMenu" class="absolute right-0 top-full mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-lg hidden z-[60]">
                    <div class="p-3 border-b border-slate-100">
                        <p class="text-xs text-slate-500">Masuk sebagai</p>
                        <p id="displayNamaGuru" class="font-bold text-slate-800 truncate"></p>
                    </div>
                    <div class="p-2">
                        <button id="btnLogout" class="w-full text-left px-3 py-2 text-sm text-rose-600 hover:bg-rose-50 rounded-lg flex items-center gap-2 transition-all font-semibold">
                            <i class="ph ph-sign-out text-lg"></i> Keluar
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto relative flex flex-col">
            <!-- LOGIN SECTION -->
            <section id="loginSection" class="p-6 flex flex-col justify-center flex-1 animate-slideUp">
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col gap-5">
                    <div class="text-center mb-2">
                        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Login</h2>
                        <p class="text-slate-500 text-sm mt-1">Masukkan ID Pembimbing & Secret.</p>
                    </div>
                    <div class="relative flex items-center">
                        <i class="ph ph-identification-card absolute left-4 text-slate-400 text-xl"></i>
                        <input type="text" id="inputIdGuru" placeholder="ID Pembimbing" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl py-3.5 pl-12 pr-4 outline-none focus:border-primary focus:bg-white transition-all font-medium">
                    </div>
                    <div class="relative flex items-center">
                        <i class="ph ph-lock-key absolute left-4 text-slate-400 text-xl"></i>
                        <input type="password" id="inputSecret" placeholder="Kata Sandi (Secret)" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl py-3.5 pl-12 pr-4 outline-none focus:border-primary focus:bg-white transition-all font-medium">
                    </div>
                    <button id="btnLanjut" class="w-full bg-primary hover:bg-blue-900 active:scale-95 text-white font-semibold rounded-xl py-3.5 flex items-center justify-center gap-2 transition-all shadow-sm mt-2">
                        Masuk <i class="ph ph-arrow-right font-bold"></i>
                    </button>
                </div>
            </section>

            <!-- MAIN APP AREA (Hidden until login) -->
            <div id="mainApp" class="hidden flex-col h-full">
                <!-- TABS -->
                <nav class="bg-white border-b border-slate-200 flex px-2 pt-2 shrink-0 overflow-x-auto no-scrollbar">
                    <button class="tab-btn active px-4 py-2.5 text-sm whitespace-nowrap flex gap-2 items-center" data-target="dashboard">
                        <i class="ph ph-squares-four text-lg"></i> Dashboard
                    </button>
                    <button class="tab-btn px-4 py-2.5 text-sm whitespace-nowrap flex gap-2 items-center" data-target="harian">
                        <i class="ph ph-calendar-check text-lg"></i> Harian
                    </button>
                    <button class="tab-btn px-4 py-2.5 text-sm whitespace-nowrap flex gap-2 items-center" data-target="periodik">
                        <i class="ph ph-table text-lg"></i> Rekap Tabel
                    </button>
                </nav>

                <!-- TAB CONTENTS -->
                <div class="flex-1 overflow-y-auto p-4 md:p-5 relative bg-slate-50/50">
                    
                    <!-- LOADING OVERLAY -->
                    <div id="loadingOverlay" class="absolute inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center gap-3 hidden">
                        <div class="spinner w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full"></div>
                        <p class="text-sm font-medium text-slate-500">Memuat Data...</p>
                    </div>

                    <!-- TAB: DASHBOARD -->
                    <div id="tab-dashboard" class="tab-content animate-fadeIn space-y-5 hidden">
                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                            <div>
                                <p class="text-sm font-medium text-slate-500">Total Bimbingan</p>
                                <p id="dashTotalSiswa" class="text-2xl font-bold text-slate-800">0 <span class="text-sm font-normal text-slate-400">Siswa</span></p>
                            </div>
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl">
                                <i class="ph-fill ph-users"></i>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-bold text-slate-800 mb-3 uppercase tracking-wider">Kehadiran Hari Ini</h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-white p-4 rounded-2xl border border-emerald-100 shadow-sm flex flex-col">
                                    <div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full bg-emerald-500"></div><p class="text-xs font-semibold text-slate-500">Hadir</p></div>
                                    <p id="dashHadir" class="text-2xl font-bold text-emerald-600">0</p>
                                </div>
                                <div class="bg-white p-4 rounded-2xl border border-rose-100 shadow-sm flex flex-col">
                                    <div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full bg-rose-500"></div><p class="text-xs font-semibold text-slate-500">Sakit</p></div>
                                    <p id="dashSakit" class="text-2xl font-bold text-rose-600">0</p>
                                </div>
                                <div class="bg-white p-4 rounded-2xl border border-amber-100 shadow-sm flex flex-col">
                                    <div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full bg-amber-500"></div><p class="text-xs font-semibold text-slate-500">Izin</p></div>
                                    <p id="dashIzin" class="text-2xl font-bold text-amber-600">0</p>
                                </div>
                                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                    <div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full bg-slate-400"></div><p class="text-xs font-semibold text-slate-500">Belum Absen</p></div>
                                    <p id="dashBelum" class="text-2xl font-bold text-slate-600">0</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TAB: HARIAN -->
                    <div id="tab-harian" class="tab-content animate-fadeIn space-y-4 hidden flex-col h-full">
                        <div class="relative shrink-0 no-print">
                            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="searchHarian" placeholder="Cari nama siswa..." class="w-full bg-white border border-slate-200 text-slate-700 text-sm rounded-xl py-2.5 pl-10 pr-4 outline-none focus:border-primary shadow-sm transition-all font-medium">
                        </div>
                        <div id="listHarian" class="flex-1 space-y-3 pb-4"></div>
                    </div>

                    <!-- TAB: PERIODIK -->
                    <div id="tab-periodik" class="tab-content animate-fadeIn space-y-4 hidden flex-col h-full">
                        <div class="flex gap-2 shrink-0 no-print">
                            <select id="filterPeriodik" class="flex-1 bg-white border border-slate-200 text-slate-700 font-medium text-sm rounded-xl px-3 py-2.5 outline-none focus:border-primary shadow-sm cursor-pointer">
                                <option value="week">Minggu Ini</option>
                                <option value="month">Bulan Ini</option>
                                <option value="all">Semua Waktu (Summary)</option>
                            </select>
                            <button id="btnExportPdf" class="bg-primary text-white p-2.5 px-3 rounded-xl shadow-sm flex items-center justify-center gap-1.5 text-sm font-semibold hover:bg-blue-900 transition-colors" title="Cetak PDF">
                                <i class="ph ph-printer text-lg"></i>
                            </button>
                        </div>
                        <div class="relative shrink-0 no-print">
                            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="searchPeriodik" placeholder="Filter nama siswa..." class="w-full bg-white border border-slate-200 text-slate-700 text-sm rounded-xl py-2.5 pl-10 pr-4 outline-none focus:border-primary shadow-sm transition-all font-medium">
                        </div>
                        <div id="tablePeriodik" class="flex-1 pb-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed -bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-xl font-semibold shadow-xl z-[100] whitespace-nowrap flex items-center gap-2 text-sm border border-slate-700">
        <i class="ph-fill ph-info text-lg text-blue-400"></i>
        <span id="toastMsg">Notifikasi</span>
    </div>

    <script src="app.js"></script>
    <script>
        // Tanggal di header
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('headerDate').innerText = now.toLocaleDateString('id-ID', options);

        window.showToast = function(message, type = "success") {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const icon = toast.querySelector('i');
            toastMsg.innerText = message;
            if (type === "error") {
                toast.className = "fixed -bottom-24 left-1/2 -translate-x-1/2 bg-rose-50 text-rose-700 px-5 py-3 rounded-xl font-semibold shadow-lg z-[100] whitespace-nowrap flex items-center gap-2 transition-all duration-300 text-sm border border-rose-200";
                icon.className = "ph-fill ph-warning-circle text-lg text-rose-500";
            } else {
                toast.className = "fixed -bottom-24 left-1/2 -translate-x-1/2 bg-emerald-50 text-emerald-700 px-5 py-3 rounded-xl font-semibold shadow-lg z-[100] whitespace-nowrap flex items-center gap-2 transition-all duration-300 text-sm border border-emerald-200";
                icon.className = "ph-fill ph-check-circle text-lg text-emerald-500";
            }
            setTimeout(() => { toast.classList.add('!bottom-8'); }, 10);
            setTimeout(() => { toast.classList.remove('!bottom-8'); }, 3000);
        }
    </script>
</body>
</html>
